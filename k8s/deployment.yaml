apiVersion: apps/v1
kind: Deployment
metadata:
  name: defi-frontend
  labels:
    app: defi-frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: defi-frontend
  template:
    metadata:
      labels:
        app: defi-frontend
    spec:
      containers:
        - name: defi-frontend
          image: ghcr.io/stephaneherraiz/defi-frontend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 80
              protocol: TCP
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "100m"
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: defi-frontend
  labels:
    app: defi-frontend
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: 80
      protocol: TCP
  selector:
    app: defi-frontend
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: defi-frontend
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web
spec:
  ingressClassName: traefik
  rules:
  - host: defi.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: defi-frontend
            port:
              number: 80
